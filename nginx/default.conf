server {
    listen 80;
    server_name morktinh.store www.morktinh.store;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name morktinh.store www.morktinh.store;

    client_max_body_size 25M;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/morktinh.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/morktinh.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Route to Django Admin
    location /django-admin/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Route to Django Backend Container (API)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Serve Django Admin Static Files directly
    location /static/ {
        alias /static/;
        access_log off;
        expires 30d;
    }

    # 4. Serve Media Directly
    location /media/ {
        alias /media/;
        access_log off;
        expires 7d;
    }

    # 5. Route to Next.js Frontend Container
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}