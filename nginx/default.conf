server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    # 1. Route to Django Backend Container
    location /api/ {
        proxy_pass http://morktinh-backend:8000;  # <-- Updated name
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Serve Media Directly
    location /media/ {
        alias /media/;
        access_log off;
        expires 7d;
    }

    # 3. Route to Next.js Frontend Container
    location / {
        proxy_pass http://morktinh-frontend:3000; # <-- Updated name
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}