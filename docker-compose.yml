services:
  db:
    image: postgres:17-alpine
    container_name: morktinh-db
    ports:
      - "5432:5432"
    env_file:
      - ./morktinh-backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  backend:
    build:
      context: ./morktinh-backend
      dockerfile: Dockerfile
    container_name: morktinh-backend
    ports:
      - "8000:8000"
    env_file:
      - ./morktinh-backend/.env
    environment:
      POSTGRES_HOST: db
    volumes:
      - ./morktinh-backend/media:/app/media
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 setting.wsgi:application"
    restart: always
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./morktinh-frontend
      dockerfile: Dockerfile
      # Removed target: dev to let it build the final "runner" stage
    container_name: morktinh-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./morktinh-frontend/.env
    restart: always
    depends_on:
      - backend

volumes:
  postgres_data:
