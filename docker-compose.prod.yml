services:
  backend:
    build:
      context: ./morktinh-backend
      dockerfile: Dockerfile
    container_name: morktinh-backend
    expose:
      - "8000"
    env_file:
      - ./morktinh-backend/.env
    volumes:
      - ./morktinh-backend/db.sqlite3:/app/db.sqlite3
      - ./morktinh-backend/media:/app/media
    restart: unless-stopped

  frontend:
    build:
      context: ./morktinh-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/
    container_name: morktinh-frontend
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: morktinh-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./morktinh-backend/media:/media:ro
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
