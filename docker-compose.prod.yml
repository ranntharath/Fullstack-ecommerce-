services:
  db:
    image: postgres:17-alpine
    container_name: morktinh-db
    env_file:
      - ./morktinh-backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./morktinh-backend
      dockerfile: Dockerfile
    container_name: morktinh-backend
    expose:
      - "8000"
    env_file:
      - ./morktinh-backend/.env
    environment:
      POSTGRES_HOST: db
    volumes:
      - ./morktinh-backend/media:/app/media
      - django_static:/app/staticfiles
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 setting.wsgi:application"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./morktinh-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/
    container_name: morktinh-frontend
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: morktinh-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./morktinh-backend/media:/media:ro
      - django_static:/static:ro
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  django_static:
